<!DOCTYPE html>
<html lang="pt-BR">
<head>

        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Agendofy</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="/assets/logo-placeholder.svg" alt="Logo" class="sidebar-logo" data-tenant-logo>
        <span class="sidebar-name" data-tenant-name>Agendofy</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label" data-i18n="nav.main">Principal</div>
        <div class="nav-item active" data-page="dashboard">
          <span class="nav-icon">📊</span> <span data-i18n="nav.dashboard">Dashboard</span>
        </div>
        <div class="nav-item" data-page="sessions">
          <span class="nav-icon">📅</span> <span data-i18n="nav.sessions">Aulas</span>
        </div>

        <div class="nav-section-label" data-i18n="nav.management">Gestão</div>
        <div class="nav-item" data-page="students">
          <span class="nav-icon">👥</span> <span data-i18n="nav.students">Alunos</span>
        </div>
        <div class="nav-item" data-page="schedules">
          <span class="nav-icon">🗓️</span> <span data-i18n="nav.schedules">Grade de Horários</span>
        </div>
        <div class="nav-item" data-page="class-types">
          <span class="nav-icon">🥊</span> <span data-i18n="nav.classTypes">Modalidades</span>
        </div>
        <div class="nav-item" data-page="instructors">
          <span class="nav-icon">👤</span> <span data-i18n="nav.instructors">Instrutores</span>
        </div>

        <div class="nav-item" data-page="package-templates">
          <span class="nav-icon">📋</span> <span data-i18n="nav.packageTemplates">Modelos de Pacote</span>
        </div>

        <div class="nav-section-label">Crescimento</div>
        <div class="nav-item" data-page="financial">
          <span class="nav-icon">💰</span> <span>Financeiro</span>
        </div>
        <div class="nav-item" data-page="heatmap">
          <span class="nav-icon">🔥</span> <span data-i18n="heatmap.title">Mapa de Calor</span>
        </div>
        <div class="nav-item" data-page="referral">
          <span class="nav-icon">🎁</span> <span>Indicar &amp; Ganhar</span>
        </div>

        <div class="nav-section-label" data-i18n="nav.config">Configurações</div>
        <div class="nav-item" data-page="locations">
          <span class="nav-icon">📍</span> <span>Locais</span>
        </div>
        <div class="nav-item" data-page="admins">
          <span class="nav-icon">🔑</span> <span data-i18n="nav.admins">Administradores</span>
        </div>
        <div class="nav-item" data-page="settings">
          <span class="nav-icon">⚙️</span> <span data-i18n="nav.settings">Configurações</span>
        </div>
        <div class="nav-item" data-page="billing">
          <span class="nav-icon">💳</span> <span>Assinatura</span>
        </div>

      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-details">
            <div class="user-name" id="userName">Carregando...</div>
            <div class="user-role" id="userRole"></div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.75rem" id="btnLogout" data-i18n="btn.logout">Sair</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-hamburger" id="btnMenuToggle" aria-label="Abrir menu">
            <span></span><span></span><span></span>
          </button>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
        </div>
        <div class="topbar-right">
          <div id="locationSelectorContainer"></div>
          <button class="btn btn-secondary btn-sm" id="btnRefresh" data-i18n="btn.refresh">↻ Atualizar</button>
        </div>
      </header>

      <main class="content-area" id="contentArea">
        <div class="loading-center"><span class="spinner"></span></div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, getUser } from '/js/auth.js';
    import { logout } from '/js/api.js';
    import { loadTenantTheme } from '/js/tenant.js';
    import { showToast } from '/js/ui.js';
    import { t } from '/js/i18n.js';
    import { renderDashboard } from '/js/admin/dashboard.js';
    import { renderSalonDashboard } from '/js/admin/salon-dashboard.js';
    import { renderStudents } from '/js/admin/students.js';
    import { renderClassTypes } from '/js/admin/class-types.js';
    import { renderSchedules } from '/js/admin/schedules.js';
    import { renderSessions } from '/js/admin/sessions.js';
    import { renderPackageTemplates } from '/js/admin/package-templates.js';
    import { renderInstructors } from '/js/admin/instructors.js';
    import { renderSettings } from '/js/admin/settings.js';
    import { renderAdmins } from '/js/admin/admins.js';
    import { renderBilling } from '/js/admin/billing.js';
    import { renderAppointments } from '/js/admin/appointments.js';
    import { renderAvailability } from '/js/admin/availability.js';
    import { renderReferral } from '/js/admin/referral.js';
    import { trackPageView } from '/js/analytics.js';
    import { initAiAssistant } from '/js/admin/ai-assistant.js';
    import { renderLocations, loadLocationsForSelector } from '/js/admin/locations.js';
    import { renderHeatmap } from '/js/admin/heatmap.js';
    import { renderSalonBilling } from '/js/admin/salon-billing.js';
    import { renderFinancial } from '/js/admin/financial.js';

    if (!requireAuth(['Admin', 'SuperAdmin'])) throw new Error('unauthorized');
    if (getUser()?.role === 'SuperAdmin') { location.href = '/superadmin/index.html'; throw new Error(); }

    const config = await loadTenantTheme();
    const isBeautySalon = config?.tenantType === 'BeautySalon';

    // Load locations for the location selector
    const { getLocationId } = await import('/js/api.js');
    const { renderLocationSelector } = await import('/js/admin/locations.js');
    const locations = await loadLocationsForSelector();
    renderLocationSelector(
      document.getElementById('locationSelectorContainer'),
      getLocationId(),
      () => navigateTo(currentPage)
    );

    // Apply i18n to static elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });

    // BeautySalon: rename nav labels and remap sessions → appointments
    if (isBeautySalon) {
      const sessNav = document.querySelector('[data-page="sessions"]');
      if (sessNav) {
        sessNav.dataset.page = 'appointments';
        sessNav.querySelector('span[data-i18n]').textContent = t('nav.appointments');
      }
      const studNav = document.querySelector('[data-page="students"] span[data-i18n]');
      if (studNav) studNav.textContent = t('nav.clients');
      const ctNav = document.querySelector('[data-page="class-types"] span[data-i18n]');
      if (ctNav) ctNav.textContent = t('nav.services.admin');
      const ctIcon = document.querySelector('[data-page="class-types"] .nav-icon');
      if (ctIcon) ctIcon.textContent = '✂️';

      // Hide gym-only pages from nav for beauty salons
      ['package-templates', 'schedules'].forEach(pg => {
        const el = document.querySelector(`[data-page="${pg}"]`);
        if (el) el.style.display = 'none';
      });

      // Rename instructors nav item to "Profissionais" for salons
      const instrNav = document.querySelector('[data-page="instructors"]');
      if (instrNav) {
        instrNav.querySelector('.nav-icon').textContent = '✂️';
        instrNav.querySelector('span[data-i18n]').textContent = 'Profissionais';
      }

      // Inject availability nav item after the appointments item
      if (sessNav) {
        const availNav = document.createElement('div');
        availNav.className = 'nav-item';
        availNav.dataset.page = 'availability';
        availNav.innerHTML = `<span class="nav-icon">🗓️</span> <span>${t('nav.availability')}</span>`;
        sessNav.insertAdjacentElement('afterend', availNav);
        availNav.addEventListener('click', () => { navigateTo('availability'); document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); });
      }

      // Inject billing report nav item in Crescimento section
      const heatmapNav = document.querySelector('[data-page="heatmap"]');
      if (heatmapNav) {
        const billingNav = document.createElement('div');
        billingNav.className = 'nav-item';
        billingNav.dataset.page = 'salon-billing';
        billingNav.innerHTML = `<span class="nav-icon">📊</span> <span>Faturamento</span>`;
        heatmapNav.insertAdjacentElement('afterend', billingNav);
        billingNav.addEventListener('click', () => { navigateTo('salon-billing'); document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('visible'); });
      }
    }

    const user = getUser();
    document.getElementById('userName').textContent = user?.name ?? '';
    document.getElementById('userRole').textContent = 'Administrador';
    document.getElementById('userAvatar').textContent = (user?.name ?? '?')[0].toUpperCase();

    const pages = {
      dashboard: { titleKey: 'nav.dashboard', render: isBeautySalon ? renderSalonDashboard : renderDashboard },
      students: { titleKey: isBeautySalon ? 'nav.clients' : 'nav.students', render: renderStudents },
      schedules: { titleKey: 'nav.schedules', render: renderSchedules },
      'class-types': { titleKey: isBeautySalon ? 'nav.services.admin' : 'nav.classTypes', render: renderClassTypes },
      sessions: { titleKey: 'nav.sessions', render: renderSessions },
      appointments: { titleKey: 'nav.appointments', render: renderAppointments },
      availability: { titleKey: 'nav.availability', render: renderAvailability },
      'package-templates': { titleKey: 'nav.packageTemplates', render: renderPackageTemplates },
      instructors: { titleKey: isBeautySalon ? 'nav.professionals' : 'nav.instructors', render: renderInstructors },
      locations: { titleKey: 'nav.locations', render: renderLocations },
      heatmap: { titleKey: 'heatmap.title', render: renderHeatmap },
      'salon-billing': { titleKey: 'nav.salonBilling', render: renderSalonBilling },
      financial: { titleKey: 'nav.financial', render: renderFinancial },
      admins: { titleKey: 'nav.admins', render: renderAdmins },
      settings: { titleKey: 'nav.settings', render: renderSettings },
      billing: { titleKey: 'nav.billing', render: renderBilling },
      referral: { titleKey: 'nav.referral', render: renderReferral },
    };

    let currentPage = 'dashboard';

    async function navigateTo(page, updateHash = true) {
      if (!pages[page]) return;
      currentPage = page;
      if (updateHash) location.hash = page;
      const pageTitle = t(pages[page].titleKey);
      document.getElementById('pageTitle').textContent = pageTitle;
      trackPageView('Admin — ' + pageTitle);
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
      });
      const content = document.getElementById('contentArea');
      content.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
      try {
        await pages[page].render(content);
      } catch (e) {
        content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">${e.message}</div></div>`;
      }
    }

    // Sidebar mobile toggle
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    const hamburger = document.getElementById('btnMenuToggle');
    function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('visible'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); }
    hamburger.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
    overlay.addEventListener('click', closeSidebar);

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => { navigateTo(item.dataset.page); closeSidebar(); });
    });

    document.getElementById('btnLogout').addEventListener('click', () => logout());
    document.getElementById('btnRefresh').addEventListener('click', () => navigateTo(currentPage));

    window.addEventListener('hashchange', () => {
      const page = location.hash.slice(1);
      if (pages[page] && page !== currentPage) navigateTo(page, false);
    });

    const initialPage = location.hash.slice(1);
    await navigateTo(pages[initialPage] ? initialPage : 'dashboard');

    initAiAssistant();
  </script>
</body>
</html>
