<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Admin — Gym App</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span style="font-size:1.75rem">🏋️</span>
        <span class="sidebar-name">Gym App</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label" data-i18n="nav.superAdmin">Super Admin</div>
        <div class="nav-item active" data-page="tenants">
          <span class="nav-icon">🏢</span>
          <span data-i18n="nav.tenants">Academias</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-details">
            <div class="user-name" id="userName">Carregando...</div>
            <div class="user-role">Super Admin</div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.75rem" id="btnLogout" data-i18n="btn.logout">Sair</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="page-title" id="pageTitle"></h1>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <button class="btn btn-secondary btn-sm" id="btnRefresh" data-i18n="btn.refresh">↻ Atualizar</button>
        </div>
      </header>

      <main class="content-area" id="contentArea">
        <div class="loading-center"><span class="spinner"></span></div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, getUser } from '/js/auth.js';
    import { logout } from '/js/api.js';
    import { loadTenantTheme } from '/js/tenant.js';
    import { t } from '/js/i18n.js';
    import { renderTenants } from '/js/admin/tenants.js';

    if (!requireAuth(['SuperAdmin'])) throw new Error('unauthorized');

    await loadTenantTheme();

    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = t(el.dataset.i18n);
    });

    const user = getUser();
    document.getElementById('userName').textContent = user?.name ?? '';
    document.getElementById('userAvatar').textContent = (user?.name ?? '?')[0].toUpperCase();

    const pages = {
      tenants: { titleKey: 'nav.tenants', render: renderTenants },
    };

    let currentPage = 'tenants';

    async function navigateTo(page) {
      if (!pages[page]) return;
      currentPage = page;
      document.getElementById('pageTitle').textContent = t(pages[page].titleKey);
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
      });
      const content = document.getElementById('contentArea');
      content.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
      try {
        await pages[page].render(content);
      } catch (e) {
        content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">${e.message}</div></div>`;
      }
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => navigateTo(item.dataset.page));
    });

    document.getElementById('btnLogout').addEventListener('click', () => logout());
    document.getElementById('btnRefresh').addEventListener('click', () => navigateTo(currentPage));

    await navigateTo('tenants');
  </script>
</body>
</html>
