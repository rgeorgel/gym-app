<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <!-- Icon: Calendar -->
  <rect x="0" y="6" width="62" height="62" rx="13" fill="#E8264A"/>
  <!-- Calendar header (darker) -->
  <rect x="0" y="6" width="62" height="24" rx="13" fill="#C01F3E"/>
  <rect x="0" y="22" width="62" height="8" fill="#C01F3E"/>
  <!-- Header text line -->
  <rect x="9" y="14" width="28" height="3" rx="1.5" fill="white" opacity="0.5"/>
  <!-- Small circle on header right -->
  <circle cx="48" cy="16" r="4" fill="white" opacity="0.25"/>
  <!-- Date grid row 1 -->
  <circle cx="16" cy="44" r="4" fill="white"/>
  <circle cx="31" cy="44" r="4" fill="white"/>
  <circle cx="46" cy="44" r="4" fill="white"/>
  <!-- Date grid row 2 -->
  <circle cx="16" cy="58" r="4" fill="white" opacity="0.4"/>
  <circle cx="31" cy="58" r="4" fill="white"/>
  <circle cx="46" cy="58" r="4" fill="white" opacity="0.4"/>

  <!-- Wordmark -->
  <text x="80" y="50" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#0C1220" letter-spacing="-0.8">agendo<tspan fill="#E8264A">fy</tspan></text>
</svg>
