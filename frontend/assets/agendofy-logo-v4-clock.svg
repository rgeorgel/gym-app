<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 72" width="292" height="72">
  <!-- Icon: Rounded square + clock face -->
  <rect x="2" y="4" width="64" height="64" rx="15" fill="#E8264A"/>
  <!-- Clock face ring -->
  <circle cx="34" cy="36" r="20" fill="none" stroke="white" stroke-width="2"/>
  <!-- Tick marks (4 cardinal) -->
  <line x1="34" y1="18" x2="34" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="52" y1="36" x2="48" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="34" y1="54" x2="34" y2="50" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="36" x2="20" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Hour hand ~10:00 -->
  <line x1="34" y1="36" x2="24" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand ~12:10 -->
  <line x1="34" y1="36" x2="40" y2="21" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="34" cy="36" r="3" fill="white"/>

  <!-- Wordmark -->
  <text x="82" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#0C1220" letter-spacing="-0.5">agendo<tspan fill="#E8264A">fy</tspan></text>
</svg>
