<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 168" width="220" height="168">
  <!-- Icon: Rounded square with stylized A -->
  <rect x="80" y="0" width="60" height="60" rx="16" fill="#E8264A"/>
  <!-- Stylized A using paths (geometric, clean) -->
  <!-- Left leg -->
  <polygon points="99,48 109,18 112,18 102,48" fill="white"/>
  <!-- Right leg -->
  <polygon points="121,48 111,18 108,18 118,48" fill="white"/>
  <!-- Crossbar -->
  <rect x="101" y="35" width="18" height="4" rx="2" fill="white"/>

  <!-- Wordmark centered -->
  <text x="110" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#0C1220" text-anchor="middle" letter-spacing="-0.8">agendo<tspan fill="#E8264A">fy</tspan></text>

  <!-- Divider -->
  <rect x="60" y="122" width="100" height="1" rx="0.5" fill="#E8264A" opacity="0.3"/>

  <!-- Tagline -->
  <text x="110" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8A8FA8" text-anchor="middle" letter-spacing="2.5">AGENDAMENTO ONLINE</text>
