<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NWZTF6F3M6"></script>

    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NWZTF6F3M6');

  <!-- Microsoft Clarity -->
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "vxxeenq2oz");

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym App</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>
  <div class="app-layout">
    <!-- Top navbar -->
    <nav class="app-navbar">
      <div class="app-navbar-brand">
        <img src="/assets/logo-placeholder.svg" alt="Logo" class="app-navbar-logo" data-tenant-logo>
        <span class="app-navbar-name" data-tenant-name>Gym App</span>
      </div>
      <div class="app-navbar-actions">
        <span id="navUserName" style="font-size:var(--font-size-sm);opacity:0.8"></span>
        <button class="btn btn-sm" id="btnAppLogout" style="background:rgba(255,255,255,0.15);color:white;border:none" data-i18n="btn.logout"></button>
      </div>
    </nav>

    <!-- Desktop tabs -->
    <div class="app-tabs">
      <div class="app-tab active" data-tab="schedule" data-i18n="app.schedule"></div>
      <div class="app-tab" data-tab="bookings" data-i18n="app.bookings"></div>
      <div class="app-tab" data-tab="packages" data-i18n="app.packages"></div>
      <div class="app-tab" data-tab="store" data-i18n="store.tab"></div>
    </div>

    <!-- Content -->
    <main class="app-content" id="appContent">
      <div class="loading-center"><span class="spinner"></span></div>
    </main>

    <!-- Bottom nav (mobile) -->
    <nav class="bottom-nav">
      <div class="bottom-nav-item active" data-tab="schedule">
        <span class="bottom-nav-icon">📅</span>
        <span data-i18n="app.schedule.short"></span>
      </div>
      <div class="bottom-nav-item" data-tab="bookings">
        <span class="bottom-nav-icon">🎫</span>
        <span data-i18n="app.bookings.short"></span>
      </div>
      <div class="bottom-nav-item" data-tab="packages">
        <span class="bottom-nav-icon">📦</span>
        <span data-i18n="app.packages.short"></span>
      </div>
      <div class="bottom-nav-item" data-tab="store">
        <span class="bottom-nav-icon">🛒</span>
        <span data-i18n="store.tab.short"></span>
      </div>
    </nav>
  </div>

  <script type="module">
    import { requireAuth, getUser } from '/js/auth.js';
    import { logout } from '/js/api.js';
    import { loadTenantTheme } from '/js/tenant.js';
    import { renderSchedule } from '/js/app/schedule.js';
    import { renderMyBookings } from '/js/app/my-bookings.js';
    import { renderMyPackages } from '/js/app/my-packages.js';
    import { renderPlans } from '/js/app/plans.js';
    import { trackPageView } from '/js/analytics.js';

    if (!requireAuth(['Student', 'Admin', 'SuperAdmin'])) throw new Error('unauthorized');

    await loadTenantTheme();

    const user = getUser();
    document.getElementById('navUserName').textContent = user?.name ?? '';

    const tabs = {
      schedule: renderSchedule,
      bookings: renderMyBookings,
      packages: renderMyPackages,
      store: renderPlans,
    };

    let currentTab = 'schedule';

    async function switchTab(tab) {
      if (!tabs[tab]) return;
      currentTab = tab;

      document.querySelectorAll('.app-tab, .bottom-nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });

      const tabNames = { schedule: 'Agenda', bookings: 'Meus Agendamentos', packages: 'Meus Pacotes', store: 'Loja' };
      trackPageView(tabNames[tab] ?? tab);

      const content = document.getElementById('appContent');
      content.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
      await tabs[tab](content);
    }

    document.querySelectorAll('[data-tab]').forEach(el => {
      el.addEventListener('click', () => switchTab(el.dataset.tab));
    });

    document.getElementById('btnAppLogout').addEventListener('click', () => logout());

    await switchTab('schedule');
  </script>
</body>
</html>
