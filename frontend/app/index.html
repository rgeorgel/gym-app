<!DOCTYPE html>
<html lang="pt-BR">
<head>

    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendofy</title>
  <link rel="stylesheet" href="/css/main.css?v=202603311200">
  <link rel="stylesheet" href="/css/app.css?v=202603311200">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>
  <div class="app-layout">
    <!-- Top navbar -->
    <nav class="app-navbar">
      <div class="app-navbar-brand">
        <img src="/assets/logo-placeholder.svg" alt="Logo" class="app-navbar-logo" data-tenant-logo>
        <span class="app-navbar-name" data-tenant-name>Agendofy</span>
      </div>
      <div class="app-navbar-actions">
        <span id="navUserName" style="font-size:var(--font-size-sm);opacity:0.8"></span>
        <button class="btn btn-sm" id="btnAppLogout" style="background:rgba(255,255,255,0.15);color:white;border:none" data-i18n="btn.logout"></button>
      </div>
    </nav>

    <!-- Desktop tabs - populated dynamically by JS based on tenant type -->
    <div class="app-tabs" id="appTabsBar"></div>

    <!-- Content -->
    <main class="app-content" id="appContent">
      <div class="loading-center"><span class="spinner"></span></div>
    </main>

    <!-- Bottom nav (mobile) - populated dynamically by JS based on tenant type -->
    <nav class="bottom-nav" id="bottomNavBar"></nav>
  </div>

  <script type="module">
    import { requireAuth, getUser } from '/js/auth.js';
    import { logout } from '/js/api.js';
    import { loadTenantTheme } from '/js/tenant.js';
    import { t } from '/js/i18n.js';
    import { renderSchedule } from '/js/app/schedule.js';
    import { renderMyBookings } from '/js/app/my-bookings.js';
    import { renderMyPackages } from '/js/app/my-packages.js';
    import { renderPlans } from '/js/app/plans.js';
    import { renderServices } from '/js/app/services.js';
    import { renderSalonBooking } from '/js/app/salon-booking.js';
    import { trackPageView } from '/js/analytics.js';

    if (!requireAuth(['Student', 'Admin', 'SuperAdmin'])) throw new Error('unauthorized');

    const config = await loadTenantTheme();
    const isBeautySalon = (config?.tenantType ?? 'Gym') === 'BeautySalon';

    const user = getUser();
    document.getElementById('navUserName').textContent = user?.name ?? '';

    // Build tab configuration based on business type
    const tabsConfig = isBeautySalon
      ? [
          { id: 'services', label: t('app.services'), icon: '💅', short: t('app.services.short'), render: renderSalonBooking },
          { id: 'bookings', label: t('app.bookings'), icon: '🎫', short: t('app.bookings.short'), render: renderMyBookings },
        ]
      : [
          { id: 'schedule', label: t('app.schedule'), icon: '📅', short: t('app.schedule.short'), render: renderSchedule },
          { id: 'bookings', label: t('app.bookings'), icon: '🎫', short: t('app.bookings.short'), render: renderMyBookings },
          { id: 'packages', label: t('app.packages'), icon: '📦', short: t('app.packages.short'), render: renderMyPackages },
          { id: 'store', label: t('store.tab'), icon: '🛒', short: t('store.tab.short'), render: renderPlans },
        ];

    const tabs = Object.fromEntries(tabsConfig.map(tc => [tc.id, tc.render]));
    const defaultTab = tabsConfig[0].id;

    // Inject tab bar
    document.getElementById('appTabsBar').innerHTML = tabsConfig
      .map((tc, i) => `<div class="app-tab ${i === 0 ? 'active' : ''}" data-tab="${tc.id}">${tc.label}</div>`)
      .join('');

    // Inject bottom nav
    document.getElementById('bottomNavBar').innerHTML = tabsConfig
      .map((tc, i) => `
        <div class="bottom-nav-item ${i === 0 ? 'active' : ''}" data-tab="${tc.id}">
          <span class="bottom-nav-icon">${tc.icon}</span>
          <span>${tc.short}</span>
        </div>
      `).join('');

    let currentTab = defaultTab;

    async function switchTab(tab) {
      if (!tabs[tab]) return;
      currentTab = tab;

      document.querySelectorAll('.app-tab, .bottom-nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });

      trackPageView(tab);

      const content = document.getElementById('appContent');
      content.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
      await tabs[tab](content);
    }

    document.querySelectorAll('[data-tab]').forEach(el => {
      el.addEventListener('click', () => switchTab(el.dataset.tab));
    });

    window.addEventListener('switch-tab', e => switchTab(e.detail.tab));

    document.getElementById('btnAppLogout').addEventListener('click', () => logout());

    await switchTab(defaultTab);
  </script>
</body>
</html>
