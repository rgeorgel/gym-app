<!DOCTYPE html>
<html lang="pt-BR">
<head>

    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Afiliados — Agendofy</title>
  <link rel="stylesheet" href="/css/main.css?v=202604030001">
  <link rel="stylesheet" href="/css/admin.css?v=202604030001">
  <link rel="stylesheet" href="/css/affiliate.css?v=202604030001">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span style="font-size:1.75rem">🏋️</span>
        <span class="sidebar-name">Agendofy</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active" data-tab="dashboard">
          <span class="nav-icon">📊</span>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" data-tab="referrals">
          <span class="nav-icon">🔗</span>
          <span>Indicações</span>
        </div>
        <div class="nav-item" data-tab="commissions">
          <span class="nav-icon">💰</span>
          <span>Comissões</span>
        </div>
        <div class="nav-item" data-tab="withdrawals">
          <span class="nav-icon">💳</span>
          <span>Saques</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-details">
            <div class="user-name" id="userName">Carregando...</div>
            <div class="user-role">Afiliado</div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm" style="width:100%;margin-top:0.75rem" id="btnLogout">Sair</button>
      </div>
    </aside>

    <div class="main-content">
      <header class="topbar">
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <button class="btn btn-secondary btn-sm" id="btnRefresh">↻ Atualizar</button>
        </div>
      </header>

      <main class="content-area" id="contentArea">
        <div class="loading-center"><span class="spinner"></span></div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, getUser } from '/js/auth.js?v=202604030001';
    import { logout } from '/js/api.js?v=202604030001';
    import { renderAffiliateDashboard } from '/js/affiliate/dashboard.js?v=202604030001';
    import { renderAffiliateReferrals } from '/js/affiliate/referrals.js?v=202604030001';
    import { renderAffiliateCommissions } from '/js/affiliate/commissions.js?v=202604030001';
    import { renderAffiliateWithdrawals } from '/js/affiliate/withdrawals.js?v=202604030001';

    if (!requireAuth(['Affiliate'])) throw new Error('unauthorized');

    const user = getUser();
    document.getElementById('userName').textContent = user?.name ?? '';
    document.getElementById('userAvatar').textContent = (user?.name ?? '?')[0].toUpperCase();

    const tabs = {
      dashboard: { title: 'Dashboard', render: renderAffiliateDashboard },
      referrals: { title: 'Indicações', render: renderAffiliateReferrals },
      commissions: { title: 'Comissões', render: renderAffiliateCommissions },
      withdrawals: { title: 'Saques', render: renderAffiliateWithdrawals },
    };

    let currentTab = 'dashboard';

    async function switchTab(tab) {
      if (!tabs[tab]) return;
      currentTab = tab;
      document.getElementById('pageTitle').textContent = tabs[tab].title;
      history.replaceState(null, '', '#' + tab);
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      const content = document.getElementById('contentArea');
      content.innerHTML = '<div class="loading-center"><span class="spinner"></span></div>';
      await tabs[tab].render(content);
    }

    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => switchTab(item.dataset.tab));
    });

    document.getElementById('btnLogout').addEventListener('click', () => logout());
    document.getElementById('btnRefresh').addEventListener('click', () => switchTab(currentTab));

    const hashTab = window.location.hash.slice(1);
    await switchTab(tabs[hashTab] ? hashTab : 'dashboard');
  </script>
</body>
</html>
