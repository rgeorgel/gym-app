# Detect main domain vs tenant subdomain by counting hostname parts:
#   agendofy.com            → 2 parts → landing page
#   boxe-elite.agendofy.com → 3 parts → student app
map $host $root_index {
    ~^www\.                 landing-choice.html;   # www.* always → landing
    ~^[^.]+\.[^.]+\.[^.]+  app/index.html; # subdomain → student app
    default                 landing-choice.html;   # apex domain / localhost → landing
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    index $root_index;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Admin panel SPA
    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # Student app SPA
    location /app {
        try_files $uri $uri/ /app/index.html;
    }

    # Service catalog (public booking page for salons)
    location /catalog {
        index index.html;
        try_files $uri $uri/ /catalog/index.html;
    }

    # Portuguese alias for catalog
    location /catalogo {
        return 301 /catalog$is_args$args;
    }

    # Short alias for landing-salao
    location = /salao.html {
        return 301 /landing-salao.html$is_args$args;
    }

    # Static assets with long cache
    location ~* \.(css|js|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SEO files — no cache, correct content-type
    location = /robots.txt {
        add_header Content-Type "text/plain";
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /sitemap.xml {
        add_header Content-Type "application/xml";
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Legacy /index.html → redirect to landing
    location = /index.html {
        return 301 /;
    }

    # Root: serve index based on host (landing or student app)
    location / {
        try_files $uri $uri/ =404;
    }
}
