# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name agendofy.com www.agendofy.com *.agendofy.com;
    return 301 https://$host$request_uri;
}

# HTTPS server for agendofy.com and all subdomains
server {
    listen 443 ssl http2;
    server_name agendofy.com www.agendofy.com *.agendofy.com;

    ssl_certificate /etc/ssl/agendofy/cert.pem;
    ssl_certificate_key /etc/ssl/agendofy/key.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy /admin to backend, rewrite to /admin/index.html
    location = /admin {
        proxy_pass http://localhost:8095/admin/index.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Proxy all /admin/* paths normally
    location /admin/ {
        proxy_pass http://localhost:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Root path: proxy to /landing.html for main domain
    location = / {
        # Check if it's main domain or subdomain
        set $target_page /landing.html;
        
        # If subdomain (not agendofy.com or www.agendofy.com), use /app/index.html
        if ($host ~* ^(?!www\.|agendofy\.com$).+\.agendofy\.com$) {
            set $target_page /app/index.html;
        }
        
        proxy_pass http://localhost:8095$target_page;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Everything else proxy normally
    location / {
        proxy_pass http://localhost:8095;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
