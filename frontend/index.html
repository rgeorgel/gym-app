<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym App — Login</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a2e">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="/assets/logo-placeholder.svg" alt="Gym App" data-tenant-logo>
        <span class="app-name" data-tenant-name>Gym App</span>
      </div>

      <!-- Login form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">E-mail</label>
          <input class="form-control" id="email" type="email" autocomplete="email"
            placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input class="form-control" id="password" type="password" autocomplete="current-password"
            placeholder="••••••••" required>
        </div>

        <div id="loginError" class="form-error hidden"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
          Entrar
        </button>
        <div class="text-center text-sm" style="margin-top:0.75rem">
          <a href="/reset-password.html" style="color:var(--text-muted)">Esqueci minha senha</a>
        </div>
      </form>

      <!-- Register form (hidden by default) -->
      <form id="registerForm" class="hidden" novalidate>
        <div class="form-group">
          <label class="form-label" for="regName">Nome completo *</label>
          <input class="form-control" id="regName" type="text" autocomplete="name" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">E-mail *</label>
          <input class="form-control" id="regEmail" type="email" autocomplete="email" placeholder="seu@email.com" required>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
          <div class="form-group">
            <label class="form-label" for="regPhone">Telefone</label>
            <input class="form-control" id="regPhone" type="tel" autocomplete="tel" placeholder="(11) 99999-0000">
          </div>
          <div class="form-group">
            <label class="form-label" for="regBirth">Data de nascimento</label>
            <input class="form-control" id="regBirth" type="date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Senha *</label>
          <input class="form-control" id="regPassword" type="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPasswordConfirm">Confirmar senha *</label>
          <input class="form-control" id="regPasswordConfirm" type="password" autocomplete="new-password" placeholder="••••••••" required>
        </div>

        <div id="registerError" class="form-error hidden"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem">
          Criar conta
        </button>
      </form>

      <!-- Toggle links -->
      <div id="toRegister" class="text-center text-sm" style="margin-top:1.25rem">
        Ainda não tem conta?
        <a href="#" id="linkRegister" style="font-weight:600">Cadastre-se</a>
      </div>
      <div id="toLogin" class="hidden text-center text-sm" style="margin-top:1.25rem">
        Já tem conta?
        <a href="#" id="linkLogin" style="font-weight:600">Entrar</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initLoginPage } from '/js/auth.js';
    initLoginPage();
  </script>
</body>
</html>
