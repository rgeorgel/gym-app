services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gymapp}
      POSTGRES_USER: ${POSTGRES_USER:-gymapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymapp123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gymapp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gymapp
    ports:
    - "9432:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-gymapp};Username=${POSTGRES_USER:-gymapp};Password=${POSTGRES_PASSWORD:-gymapp123}"
      Jwt__Secret: "${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_32_CHARS_MIN}"
      Jwt__Issuer: "gymapp"
      Jwt__Audience: "gymapp"
      Jwt__ExpiryMinutes: "60"
      Jwt__RefreshExpiryDays: "30"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: "http://+:5000"
      Cors__AllowedOrigins__0: "http://localhost:8095"
      Cors__AllowedOrigins__1: "http://localhost"
      App__FrontendUrl: "${FRONTEND_URL:-http://localhost}"
      Email__Provider: "${EMAIL_PROVIDER:-SendGrid}"
      SendGrid__ApiKey: "${SENDGRID_API_KEY:-}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL:-noreply@seudominio.com}"
      SendGrid__FromName: "${SENDGRID_FROM_NAME:-Gym App}"
      Resend__ApiKey: "${RESEND_API_KEY:-}"
      Resend__FromEmail: "${RESEND_FROM_EMAIL:-noreply@seudominio.com}"
      Resend__FromName: "${RESEND_FROM_NAME:-Gym App}"
      AbacatePay__ApiKey: "${ABACATEPAY_API_KEY:-}"
      AbacatePay__SubscriptionPriceCents: "${ABACATEPAY_PRICE_CENTS:-4900}"
      AbacatePay__WebhookSecret: "${ABACATEPAY_WEBHOOK_SECRET:-}"
      Efi__ClientId: "${EFI_CLIENT_ID:-}"
      Efi__ClientSecret: "${EFI_CLIENT_SECRET:-}"
      Efi__CertificateBase64: "${EFI_CERTIFICATE_BASE64:-}"
      Efi__CertificatePassword: "${EFI_CERTIFICATE_PASSWORD:-}"
      Efi__PixKey: "${EFI_PIX_KEY:-}"
      Efi__PlatformPayeeCode: "${EFI_PLATFORM_PAYEE_CODE:-}"
      Efi__PlatformFeePercent: "${EFI_PLATFORM_FEE_PERCENT:-0}"
    networks:
      - gymapp
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8095}:80"
    networks:
      - gymapp

volumes:
  postgres_data:

networks:
  gymapp:
    driver: bridge
